# macos-hig-reviewer custom SwiftLint rules
# This configuration encourages idiomatic macOS Swift code.

disabled_rules:
  - trailing_whitespace
  - line_length

opt_in_rules:
  - empty_count
  - implicit_return
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - anyobject_protocol
  - file_header

# Custom rules to flag iOS-only patterns or encourage macOS HIG compliance
custom_rules:
  no_uikit_imports:
    name: "UIKit Import"
    regex: "import UIKit"
    message: "macOS applications should use AppKit or SwiftUI natively instead of UIKit."
    severity: warning

  menu_bar_check:
    name: "Missing Menu Bar Configuration"
    regex: "@main\\s+struct.*App\\s*\\{[\\s\\S]*?\\}(?![\\s\\S]*\\.commands)"
    message: "Consider adding a .commands modifier to your App definition to provide a standard macOS Menu Bar."
    severity: warning

  avoid_ios_navigation_styles:
    name: "Avoid iOS Navigation Styles"
    regex: "\\.navigationBarTitleDisplayMode"
    message: "iOS-specific navigation modifiers might look out of place on macOS. Prefer idiomatic macOS layouts like NavigationSplitView or Window toolbars."
    severity: warning
